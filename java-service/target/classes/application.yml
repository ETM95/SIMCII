server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/simcii_db
    username: simcii_user
    password: simcii_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
